<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:inline-flex; align-items:center; gap:6px; padding:5px 10px 5px 8px; border-radius:999px; background:{{ bg }}; border:1px solid {{ border }}; font-family:'Inter',sans-serif;">
  <span style="width:7px; height:7px; border-radius:50%; background:{{ dot }}; flex-shrink:0;"></span>
  <span style="font-size:12.5px; font-weight:600; color:{{ text }}; white-space:nowrap;">{{ label }}</span>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:100,&quot;height&quot;:30},&quot;platform&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;youtube&quot;,&quot;options&quot;:[&quot;youtube&quot;,&quot;tiktok&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const platform = (this.props.platform || 'youtube').toLowerCase();
    const map = {
      youtube: { label: 'YouTube', dot: '#FF3B30', bg: 'rgba(255,59,48,0.07)', border: 'rgba(255,59,48,0.16)', text: '#B8241A' },
      tiktok:  { label: 'TikTok',  dot: '#14151a', bg: 'rgba(20,21,26,0.06)', border: 'rgba(20,21,26,0.14)', text: '#14151a' },
    };
    const m = map[platform] || map.youtube;
    return { label: this.props.label || m.label, dot: m.dot, bg: m.bg, border: m.border, text: m.text };
  }
}

</script>
</body>
</html>
