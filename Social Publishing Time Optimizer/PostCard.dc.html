<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; align-items:center; gap:14px; padding:12px 14px; background:#fff; border:1px solid rgba(26,26,26,0.08); border-radius:12px; font-family:'Inter',sans-serif;">
  <div style="width:64px; height:64px; border-radius:9px; flex-shrink:0; background:{{ thumbBg }}; background-image:repeating-linear-gradient(135deg, rgba(255,255,255,0.5) 0px, rgba(255,255,255,0.5) 2px, transparent 2px, transparent 10px); display:flex; align-items:center; justify-content:center; overflow:hidden;">
    <span style="font-family:'IBM Plex Mono',monospace; font-size:7px; color:rgba(255,255,255,0.85); text-align:center; line-height:1.3; padding:0 4px;">{{ thumbLabel }}</span>
  </div>
  <div style="flex:1; min-width:0; display:flex; flex-direction:column; gap:6px;">
    <div style="font-size:14px; font-weight:600; color:#17181c; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ title }}</div>
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
      <sc-for list="{{ platforms }}" as="p" hint-placeholder-count="2">
        <dc-import name="PlatformBadge" platform="{{ p }}" hint-size="80,26"></dc-import>
      </sc-for>
      <span style="font-size:12.5px; color:rgba(26,26,26,0.5);">{{ scheduledLabel }}</span>
    </div>
  </div>
  <dc-import name="StatusBadge" status="{{ status }}" hint-size="90,26" style="flex-shrink:0;"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:90},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;How I edit short-form videos 3x faster&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;scheduledLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Tue, Jul 7 \u00b7 6:00 PM&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;status&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;scheduled&quot;,&quot;options&quot;:[&quot;draft&quot;,&quot;scheduled&quot;,&quot;published&quot;,&quot;failed&quot;,&quot;needsreview&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;thumbSeed&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;tsType&quot;:&quot;number&quot;},&quot;thumbLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;THUMBNAIL&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const seed = this.props.thumbSeed || 0;
    const palette = ['#3D5AFE', '#0E9F6E', '#E8734A', '#7C5CFF', '#14151a'];
    const thumbBg = palette[seed % palette.length];
    return {
      title: this.props.title || 'Untitled post',
      platforms: this.props.platforms || [],
      scheduledLabel: this.props.scheduledLabel || '',
      status: this.props.status || 'draft',
      thumbBg,
      thumbLabel: this.props.thumbLabel || 'THUMBNAIL',
    };
  }
}

</script>
</body>
</html>
