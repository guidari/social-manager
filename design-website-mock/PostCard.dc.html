<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <div
        style="
          display: flex;
          align-items: center;
          gap: 14px;
          padding: 12px 14px;
          background: #fff;
          border: 1px solid rgba(26, 26, 26, 0.08);
          border-radius: 12px;
          font-family: &quot;Inter&quot;, sans-serif;
        "
      >
        <div
          style="width:64px; height:64px; border-radius:9px; flex-shrink:0; background:{{ thumbBg }}; background-image:repeating-linear-gradient(135deg, rgba(255,255,255,0.5) 0px, rgba(255,255,255,0.5) 2px, transparent 2px, transparent 10px); display:flex; align-items:center; justify-content:center; overflow:hidden;"
        >
          <span
            style="
              font-family: &quot;IBM Plex Mono&quot;, monospace;
              font-size: 7px;
              color: rgba(255, 255, 255, 0.85);
              text-align: center;
              line-height: 1.3;
              padding: 0 4px;
            "
            >{{ thumbLabel }}</span
          >
        </div>
        <div style="flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px">
          <div
            style="
              font-size: 14px;
              font-weight: 600;
              color: #17181c;
              white-space: nowrap;
              overflow: hidden;
              text-overflow: ellipsis;
            "
          >
            {{ title }}
          </div>
          <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap">
            <sc-for list="{{ platforms }}" as="p" hint-placeholder-count="2">
              <dc-import name="PlatformBadge" platform="{{ p }}" hint-size="80,26"></dc-import>
            </sc-for>
            <span style="font-size: 12.5px; color: rgba(26, 26, 26, 0.5)"
              >{{ scheduledLabel }}</span
            >
          </div>
        </div>
        <dc-import
          name="StatusBadge"
          status="{{ status }}"
          hint-size="90,26"
          style="flex-shrink: 0"
        ></dc-import>
      </div>
    </x-dc>
    <script
      type="text/x-dc"
      data-dc-script
      data-props='{"$preview":{"width":420,"height":90},"title":{"editor":"text","default":"How I edit short-form videos 3x faster","tsType":"string"},"scheduledLabel":{"editor":"text","default":"Tue, Jul 7 \u00b7 6:00 PM","tsType":"string"},"status":{"editor":"enum","default":"scheduled","options":["draft","scheduled","published","failed","needsreview"],"tsType":"string"},"thumbSeed":{"editor":"int","default":0,"tsType":"number"},"thumbLabel":{"editor":"text","default":"THUMBNAIL","tsType":"string"}}'
    >
      class Component extends DCLogic {
        renderVals() {
          const seed = this.props.thumbSeed || 0;
          const palette = ['#3D5AFE', '#0E9F6E', '#E8734A', '#7C5CFF', '#14151a'];
          const thumbBg = palette[seed % palette.length];
          return {
            title: this.props.title || 'Untitled post',
            platforms: this.props.platforms || [],
            scheduledLabel: this.props.scheduledLabel || '',
            status: this.props.status || 'draft',
            thumbBg,
            thumbLabel: this.props.thumbLabel || 'THUMBNAIL',
          };
        }
      }
    </script>
  </body>
</html>
